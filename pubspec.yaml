name: aveditor
description: A video audio editor app created by CodeShipping.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.13.5"

dependencies:
  bloc: ^8.1.2
  bottom_navy_bar: ^6.1.0
  collection: ^1.17.2
  cupertino_icons: ^1.0.6
  dartz: ^0.10.1
  dotted_border: ^2.1.0
  ffmpeg_kit_flutter_new_https_gpl: ^2.1.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.3.4
  flutter_svg: ^2.0.2
  freezed_annotation: ^2.4.1
  get: ^4.6.6
  get_it: ^7.6.4
  image_gallery_saver_plus: ^4.0.1
  in_app_review: ^2.0.11
  intl: ^0.20.2
  just_audio: ^0.9.35
  modal_bottom_sheet: ^3.0.0-pre
  nil: ^1.1.1
  path: ^1.8.3
  path_provider: ^2.1.5
  photo_manager: ^3.0.0
  scroll_to_index: ^3.0.1
  shared_preferences: ^2.2.2
  sizer: ^3.1.3
  text_scroll: ^0.2.0
  url_launcher: ^6.2.1
  video_player: ^2.7.0
  wakelock_plus: ^1.1.3

dev_dependencies:
  bloc_test: ^9.1.4
  build_runner: ^2.3.3
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  very_good_analysis: ^5.1.0

dependency_overrides:
  package_info_plus: ^8.0.0
  win32: ^5.5.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Thin.ttf
          weight: 100
        - asset: assets/fonts/RobotoMono-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/RobotoMono-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/RobotoMono-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/RobotoMono-Light.ttf
          weight: 300
        - asset: assets/fonts/RobotoMono-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/RobotoMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/RobotoMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/RobotoMono-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/RobotoMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/RobotoMono-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/RobotoMono-BoldItalic.ttf
          weight: 700
          style: italic